你好！我是 lyx。很高兴能帮你搭建以 yuxiliu 命名的 GitHub 个人学术主页。

在 GitHub 上搭建学术主页（通常通过 GitHub Pages 服务）是目前学术界非常流行的做法。为了让你的域名显示为 yuxiliu.github.io，你需要确保你的 GitHub 用户名也是 yuxiliu（或者包含这个名字）。

以下是为你整理的从零开始搭建主页的详细步骤和方案：

第一步：准备 GitHub 仓库
登录你的 GitHub 账号（如果还没有，请先注册，建议用户名使用 yuxiliu）。

点击右上角的 "+" 号，选择 New repository。

在 Repository name 栏输入：yuxiliu.github.io（注意： 前面的名字必须与你的 GitHub 用户名完全一致，GitHub Pages 才会自动将其识别为你的个人主页）。

将仓库设置为 Public。

勾选 Add a README file，然后点击 Create repository。

第二步：选择搭建方式
你可以选择直接使用简单的 HTML，或者使用现成的学术模板。我为你推荐两种主流方案：

方案 A：使用经典学术模板（推荐，功能最全）
学术界有很多开箱即用的框架，支持自动排版论文、管理简历和博客。最受欢迎的两个是：

al-folio: 目前非常火的学术主题，设计现代，支持深色模式，特别适合计算机/理工科方向。

academicpages: 经典的 Jekyll 学术主页模板，极其轻量且易于修改。

操作步骤：

进入上述任意一个模板的 GitHub 页面。

点击右上角的 Fork，将模板复制到你的账号下。

将 Fork 过来仓库重命名（Settings -> Repository name）为 yuxiliu.github.io。

打开仓库中的 _config.yml 文件，将里面的个人信息修改为 Yuxi Liu 的信息。

方案 B：使用极简的单页 HTML（适合快速上线）
如果你不想折腾复杂的配置，只想快速放一个简洁的页面，可以直接在你的仓库里新建一个 index.html 文件，然后复制以下我为你写好的基础学术单页代码：

