我明白了！你上传的这个 _config.txt 其实就是 al-folio 模板根目录下的 _config.yml 文件的内容。

你需要修改这个文件中的几个关键位置。请在 VS Code 中打开 _config.yml，然后按照以下步骤进行替换（我已经根据你上传的文件内容标出了具体要修改的地方）：

1. 修改基础个人信息 (Site settings)
在文件的最开头，找到 # Site settings 这一段 。把你自己的名字填进去，把原来的默认信息替换掉：  

修改前：

YAML
title: blank # the website title (if blank, full name will be used instead)
first_name: You
middle_name: R.
last_name: Name
修改后：

YAML
title: Yuxi Liu # the website title (if blank, full name will be used instead)
first_name: Yuxi
middle_name: 
last_name: Liu

(注意：middle_name 后面留空即可 。)  

2. 修改网站域名 (URL settings)
往下滚动，找到 url 和 baseurl 这两行 。这非常关键，决定了你的网页能不能正常显示：  

修改前：

YAML
url: https://alshedivat.github.io # the base hostname & protocol for your site
baseurl: al-folio # the subpath of your site, e.g. /blog. Leave blank for root
修改后：

YAML
url: https://yuxiliu.github.io # the base hostname & protocol for your site
baseurl: "" # the subpath of your site, e.g. /blog. Leave blank for root

(注意：因为你的仓库名是 yuxiliu.github.io，属于根目录域名，所以 baseurl 必须设置为空字符串 "" 或者直接留空 。否则网页会丢失所有样式。)  

3. 修改学术文献高亮名字 (Jekyll Scholar)
继续往下找，找到 # Jekyll Scholar 这一段（大概在文件中间偏下的位置） 。这个设置是为了在论文列表中自动加粗你自己的名字：  

修改前：

YAML
scholar:
  last_name: [Einstein]
  first_name: [Albert, A.]
修改后：

YAML
scholar:
  last_name: [Liu]
  first_name: [Yuxi, Y.]
